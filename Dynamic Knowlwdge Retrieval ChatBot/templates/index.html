<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #4a4a8a;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .sub-header {
            font-size: 12px;
            color: #ddd;
        }

        .chat-box {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: #f7f8fc;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            clear: both;
        }

        .user {
            background: #667eea;
            color: white;
            float: right;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: #e4e6eb;
            color: black;
            float: left;
            border-bottom-left-radius: 4px;
        }

        .typing {
            font-style: italic;
            color: gray;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background: #fff;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 Chatbot
        <div class="sub-header">Online • Ready to help</div>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="userInput" type="text" placeholder="Type your message..."
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

// Initial greeting
window.onload = function() {
    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `<div class="message bot">Hello! I'm your chatbot. Ask me anything.</div>`;
};

function sendMessage() {
    let inputField = document.getElementById("userInput");
    let message = inputField.value.trim();

    if (message === "") return;

    let chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<div class="message user">${message}</div>`;

    // Show typing indicator
    chatBox.innerHTML += `<div class="message bot typing" id="typing">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    inputField.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("typing").remove();

        chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

</script>

</body>
</html>
